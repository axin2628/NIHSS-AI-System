<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIHSS 語音評估系統</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; transition: 0.3s; }
        .record-off { background-color: #007bff; color: white; }
        .record-on { background-color: #dc3545; color: white; }
        #status { margin-top: 20px; color: #666; }
        .result-box { margin-top: 30px; text-align: left; border-top: 1px solid #ddd; padding-top: 20px; }
        .label { font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>NIHSS 臨床評估 AI 測試</h2>
    <p>請按下按鈕並說出測試內容（例如：「請張開嘴巴」）</p>
    
    <button id="btn" class="record-off">開始錄音</button>
    <div id="status">準備就緒</div>

    <div class="result-box">
        <p><span class="label">辨識文字 (STT)：</span> <span id="stt-text">等待中...</span></p>
        <p><span class="label">AI 判讀結果：</span> <span id="ai-res">等待中...</span></p>
    </div>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const sttDisplay = document.getElementById('stt-text');
    const aiDisplay = document.getElementById('ai-res');

    // --- 設定區 ---
    const WIT_TOKEN = "2Z3JO2DMTHIIFKXE46XBDAW445LKTBUT"; // 請替換成你的 Wit.ai Token
    const LLM_URL = "http://140.116.32.48:8000/evaluate";

    btn.onclick = async () => {
        if (!mediaRecorder || mediaRecorder.state === 'inactive') {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];

            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = processAudio;

            mediaRecorder.start();
            btn.innerText = "停止並評估";
            btn.className = "record-on";
            status.innerText = "錄音中...";
        } else {
            mediaRecorder.stop();
            btn.innerText = "開始錄音";
            btn.className = "record-off";
            status.innerText = "處理中，請稍候...";
        }
    };

    async function processAudio() {
        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });

        try {
            // 1. 傳送到 Wit.ai 轉文字 (STT)
            const witRes = await fetch(`https://api.wit.ai/speech`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${WIT_TOKEN}`,
                    'Content-Type': 'audio/wav'
                },
                body: audioBlob
            });
            const witData = await witRes.json();
            const text = witData.text || "未能辨識文字";
            sttDisplay.innerText = text;

            // 2. 傳送到你的 LLM 伺服器 (Evaluate)
            const llmRes = await fetch(LLM_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: "1A", text: text })
            });
            const llmData = await llmRes.json();
            aiDisplay.innerText = `${llmData.result} (${llmData.type})`;
            status.innerText = "評估完成！";

        } catch (err) {
            status.innerText = "發生錯誤：" + err.message;
            console.error(err);
        }
    }
</script>

</body>
</html>
