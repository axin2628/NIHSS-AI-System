<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIHSS STT 測試</title>
</head>

<body style="font-family:sans-serif; text-align:center; padding:40px;">

<h2>NIHSS 語音測試（修正版）</h2>

<button id="btn">開始錄音</button>
<p id="status">準備就緒</p>

<h3>STT 結果：</h3>
<p id="stt">(尚未辨識)</p>

<script>
let mediaRecorder;
let audioChunks = [];

const btn = document.getElementById("btn");
const status = document.getElementById("status");
const sttText = document.getElementById("stt");

//  你的 token
const WIT_TOKEN = "2Z3JO2DMTHIIFKXE46XBDAW445LKTBUT";

btn.onclick = async () => {

    // 開始錄音
    if (!mediaRecorder || mediaRecorder.state === "inactive") {

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

            // 關鍵：指定 opus codec
            const options = { mimeType: 'audio/webm;codecs=opus' };
            mediaRecorder = new MediaRecorder(stream, options);

            audioChunks = [];

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) {
                    audioChunks.push(e.data);
                }
            };

            mediaRecorder.onstart = () => {
                console.log("錄音開始");
            };

            mediaRecorder.onstop = processAudio;

            mediaRecorder.start();

            btn.innerText = "停止錄音";
            status.innerText = "錄音中...";

        } catch (err) {
            status.innerText = "麥克風錯誤：" + err.message;
        }

    } else {
        // 停止錄音
        mediaRecorder.stop();
        btn.innerText = "開始錄音";
        status.innerText = "處理音訊中...";
    }
};

async function processAudio() {

    // 確保不是空音訊
    if (audioChunks.length === 0) {
        status.innerText = " 沒有錄到音訊";
        return;
    }

    const audioBlob = new Blob(audioChunks, { type: 'audio/webm;codecs=opus' });

    console.log("音訊大小:", audioBlob.size);
    console.log("格式:", mediaRecorder.mimeType);

    //  下載音檔 debug（很重要）
    const url = URL.createObjectURL(audioBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'debug_audio.webm';
    a.click();

    try {
        status.innerText = "送到 Wit.ai...";

        const res = await fetch("https://api.wit.ai/speech?v=20210928", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + WIT_TOKEN,
                "Content-Type": "audio/webm;codecs=opus"
            },
            body: audioBlob
        });

        const text = await res.text();
        console.log("Wit raw:", text);

        let finalText = "";

        // 🔥 解析多段 JSON
        const matches = text.match(/\{.*?\}/gs);

        if (matches) {
            for (let i = matches.length - 1; i >= 0; i--) {
                try {
                    const obj = JSON.parse(matches[i]);
                    if (obj.text && obj.text.trim() !== "") {
                        finalText = obj.text;
                        break;
                    }
                } catch {}
            }
        }

        if (!finalText) {
            sttText.innerText = "辨識失敗（可能音訊格式問題）";
            status.innerText = "Wit 沒聽到內容";
            return;
        }

        sttText.innerText = finalText;
        status.innerText = " 辨識成功";

    } catch (err) {
        console.error(err);
        status.innerText = "錯誤：" + err.message;
    }
}
</script>

</body>
</html>
