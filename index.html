<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIHSS 語音評估系統 v3.4</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 20px; background: #f0f2f5; color: #1c1e21; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); display: inline-block; max-width: 480px; width: 100%; box-sizing: border-box; }
        h2 { color: #1877f2; margin-bottom: 25px; }
        label { display: block; text-align: left; margin-bottom: 10px; font-weight: 600; color: #4b4f56; }
        select { padding: 12px; font-size: 16px; margin-bottom: 20px; width: 100%; border: 1px solid #dddfe2; border-radius: 6px; background-color: #f5f6f7; }
        button { padding: 16px; font-size: 18px; cursor: pointer; border: none; border-radius: 6px; width: 100%; font-weight: bold; transition: 0.2s; }
        .record-off { background-color: #1877f2; color: white; }
        .record-on { background-color: #fa3e3e; color: white; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        #status { margin-top: 15px; color: #8d949e; font-size: 14px; min-height: 20px; }
        .result-box { margin-top: 30px; text-align: left; border-top: 1px solid #dddfe2; padding-top: 20px; }
        .res-card { background: #f0f2f5; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid #1877f2; }
        .res-label { font-size: 12px; color: #606770; font-weight: bold; }
        .res-content { display: block; margin-top: 5px; font-size: 16px; font-weight: 700; color: #1c1e21; }
    </style>
</head>
<body>

<div class="container">
    <h2>NIHSS 臨床評估 AI 測試</h2>
    
    <label for="questionId">1. 選擇評估題號：</label>
    <select id="questionId">
        <option value="1A">1A: 意識程度</option>
        <option value="1B">1B: 意識提問</option>
        <option value="1C">1C: 意識指令</option>
        <option value="2">2: 最佳眼球運動</option>
        <option value="3">3: 視野</option>
        <option value="4">4: 面癱</option>
        <option value="5aL">5aL: 左上肢運動</option>
        <option value="5bR">5bR: 右上肢運動</option>
        <option value="6aL">6aL: 左下肢運動</option>
        <option value="6bR">6bR: 右下肢運動</option>
        <option value="7">7: 肢體運動失調</option>
        <option value="8">8: 感覺</option>
        <option value="9">9: 最佳語言</option>
        <option value="10">10: 構音障礙</option>
        <option value="11">11: 忽視症</option>
    </select>

    <button id="btn" class="record-off">載入系統中...</button>
    <div id="status">正在檢查錄音組件...</div>

    <div class="result-box">
        <div class="res-card">
            <span class="res-label">識別內容 (STT)</span>
            <span id="stt-text" class="res-content">等待辨識...</span>
        </div>
        <div class="res-card">
            <span class="res-label">AI 判讀建議 (LLM)</span>
            <span id="ai-res" class="res-content">等待評估...</span>
        </div>
    </div>
</div>

<script>
    // --- 最簡化、全域暴露版 Recorder ---
    var Recorder = function(source, cfg) {
        var config = cfg || {};
        var bufferLen = config.bufferLen || 4096;
        var numChannels = config.numChannels || 1; // 預設單聲道
        this.context = source.context;
        this.node = (this.context.createScriptProcessor || this.context.createJavaScriptNode).call(this.context, bufferLen, numChannels, numChannels);
        
        var workerCode = `
            var recLength = 0, recBuffers = [], sampleRate, numChannels;
            self.onmessage = function(e){
                switch(e.data.command){
                    case "init": init(e.data.config); break;
                    case "record": record(e.data.buffer); break;
                    case "exportWAV": exportWAV(e.data.type); break;
                    case "clear": clear(); break;
                }
            };
            function init(config){ sampleRate = config.sampleRate; numChannels = config.numChannels; clear(); }
            function record(inputBuffer){
                for (var channel = 0; channel < numChannels; channel++){ recBuffers[channel].push(inputBuffer[channel]); }
                recLength += inputBuffer[0].length;
            }
            function exportWAV(type){
                var buffers = [];
                for (var channel = 0; channel < numChannels; channel++){ buffers.push(mergeBuffers(recBuffers[channel], recLength)); }
                var interleaved = (numChannels === 2) ? interleave(buffers[0], buffers[1]) : buffers[0];
                var dataview = encodeWAV(interleaved);
                var audioBlob = new Blob([dataview], { type: type });
                self.postMessage(audioBlob);
            }
            function clear(){ recLength = 0; recBuffers = []; for (var channel = 0; channel < numChannels; channel++){ recBuffers[channel] = []; } }
            function mergeBuffers(recBuffers, recLength){
                var result = new Float32Array(recLength);
                var offset = 0;
                for (var i = 0; i < recBuffers.length; i++){ result.set(recBuffers[i], offset); offset += recBuffers[i].length; }
                return result;
            }
            function interleave(inputL, inputR){
                var length = inputL.length + inputR.length;
                var result = new Float32Array(length);
                var index = 0, inputIndex = 0;
                while (index < length){ result[index++] = inputL[inputIndex]; result[index++] = inputR[inputIndex]; inputIndex++; }
                return result;
            }
            function writeString(view, offset, string){ for (var i = 0; i < string.length; i++){ view.setUint8(offset + i, string.charCodeAt(i)); } }
            function encodeWAV(samples){
                var buffer = new ArrayBuffer(44 + samples.length * 2);
                var view = new DataView(buffer);
                writeString(view, 0, "RIFF");
                view.setUint32(4, 36 + samples.length * 2, true);
                writeString(view, 8, "WAVE");
                writeString(view, 12, "fmt ");
                view.setUint32(16, 16, true);
                view.setUint16(20, 1, true);
                view.setUint16(22, numChannels, true);
                view.setUint32(24, sampleRate, true);
                view.setUint32(28, sampleRate * numChannels * 2, true);
                view.setUint16(32, numChannels * 2, true);
                view.setUint16(34, 16, true);
                writeString(view, 36, "data");
                view.setUint32(40, samples.length * 2, true);
                floatTo16BitPCM(view, 44, samples);
                return view;
            }
            function floatTo16BitPCM(output, offset, input){
                for (var i = 0; i < input.length; i++, offset += 2){
                    var s = Math.max(-1, Math.min(1, input[i]));
                    output.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                }
            }
        `;

        var workerBlob = new Blob([workerCode], {type: "text/javascript"});
        var worker = new Worker(URL.createObjectURL(workerBlob));
        
        worker.postMessage({command:'init',config:{sampleRate:this.context.sampleRate,numChannels:numChannels}});
        var recording = false, currCallback;

        this.node.onaudioprocess = function(e){
            if (!recording) return;
            var buffer = [];
            for (var channel = 0; channel < numChannels; channel++){ buffer.push(e.inputBuffer.getChannelData(channel)); }
            worker.postMessage({command:'record',buffer:buffer});
        };

        this.exportWAV = function(cb, type){
            currCallback = cb;
            type = type || 'audio/wav';
            if (!currCallback) throw new Error('Callback not set');
            worker.postMessage({command:'exportWAV',type:type});
        };

        worker.onmessage = function(e){ currCallback(e.data); };
        this.record = function(){ recording = true; };
        this.stop = function(){ recording = false; };
        source.connect(this.node);
        this.node.connect(this.context.destination);
    };
    // 關鍵：將其強制暴露給全域
    window.Recorder = Recorder;
</script>

<script>
    // --- 業務邏輯 ---
    let audioContext;
    let rec;
    let gumStream;

    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const sttDisplay = document.getElementById('stt-text');
    const aiDisplay = document.getElementById('ai-res');

    const WIT_TOKEN = "2Z3JO2DMTHIIFKXE46XBDAW445LKTBUT"; 
    const LLM_URL = "http://140.116.32.48:8000/evaluate";

    // 頁面載入時檢查
    window.onload = function() {
        if (window.Recorder) {
            btn.innerText = "開始錄音";
            status.innerText = "系統就緒";
        } else {
            status.innerText = "錯誤：錄音組件加載失敗";
            btn.disabled = true;
        }
    };

    btn.onclick = async function() {
        if (!window.Recorder) {
            alert("錄音組件未就緒，請重新整理");
            return;
        }

        if (!rec || !rec.recording) {
            try {
                //Chrome 安全政策，AudioContext 必須在點擊事件中初始化
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                }
                
                gumStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                let input = audioContext.createMediaStreamSource(gumStream);
                
                // 強制在全域空間呼叫
                rec = new window.Recorder(input, { numChannels: 1 });
                rec.record();

                btn.innerText = "停止錄音並分析";
                btn.className = "record-on";
                status.innerText = "錄音中 (16kHz WAV)...";
            } catch (err) {
                status.innerText = "無法開啟麥克風: " + err.message;
            }
        } else {
            rec.stop();
            gumStream.getAudioTracks()[0].stop();
            btn.innerText = "開始錄音";
            btn.className = "record-off";
            status.innerText = "處理音訊中...";
            rec.exportWAV(processAudio);
        }
    };

    async function processAudio(blob) {
        const cleanToken = WIT_TOKEN.replace(/[^\x00-\x7F]/g, "").trim();
        status.innerText = "正在辨識語音...";

        try {
            const witRes = await fetch(`https://api.wit.ai/speech`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${cleanToken}`,
                    'Content-Type': 'audio/wav' 
                },
                body: blob
            });

            const rawResponse = await witRes.text();
            const jsonMatches = rawResponse.match(/\{.*?\}(?=\s*\{|$)/gs);
            let finalStt = "";

            if (jsonMatches) {
                for (let i = jsonMatches.length - 1; i >= 0; i--) {
                    try {
                        const jsonObj = JSON.parse(jsonMatches[i]);
                        if (jsonObj.text) { finalStt = jsonObj.text; break; }
                    } catch (e) { continue; }
                }
            }

            if (!finalStt) {
                status.innerText = "辨識失敗，請再試一次。";
                return;
            }

            sttDisplay.innerText = finalStt;
            status.innerText = "連線至成大 LLM...";

            const llmRes = await fetch(LLM_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    question: document.getElementById('questionId').value,
                    text: finalStt
                })
            });

            const llmData = await llmRes.json();
            aiDisplay.innerText = `${llmData.result} (${llmData.type || 'N/A'})`;
            status.innerText = "評估完成！";

        } catch (err) {
            status.innerText = "連線失敗: " + err.message;
        }
    }
</script>
</body>
</html>
