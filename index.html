<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIHSS LLM 語音輸入測試</title>
    <style>
        :root {
            --primary-blue: #1b78f2;
            --primary-green: #42b72a;
            --bg-gray: #f8f9fa;
            --text-gray: #4e4e4e;
            --border-color: #e7e7e7;
            --disabled-text: #b0b0b0;
        }

        body {
            font-family: 'Noto Sans', 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            color: var(--text-gray);
        }

        .main-card {
            background: white;
            width: 100%;
            max-width: 800px;
            border-radius: 25px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
            padding: 40px;
        }

        h1 { color: var(--primary-blue); font-size: 32px; text-align: center; margin-bottom: 30px; }

        .doctor-bar {
            display: flex; align-items: center; justify-content: space-between;
            background: #f0f5ff; border: 1px solid #d0e0ff;
            border-radius: 12px; padding: 10px 18px;
            margin-bottom: 20px; font-size: 14px; color: #333;
        }
        .doctor-bar span { font-weight: 600; color: var(--primary-blue); }
        .doctor-bar button {
            background: none; border: 1px solid #aac4ff;
            border-radius: 8px; padding: 4px 12px;
            font-size: 13px; color: var(--primary-blue); cursor: pointer;
        }
        .doctor-bar button:hover { background: #e0ecff; }

        .section-header {
            background: var(--bg-gray); border-radius: 20px;
            padding: 25px; text-align: center; margin-bottom: 25px;
        }
        .section-title { font-size: 20px; font-weight: 700; margin-bottom: 15px; }
        .selector-group { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .nav-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: #f1f1f1; cursor: pointer; transition: 0.2s; }
        .nav-btn:disabled { background: white; color: var(--disabled-text); border: 1px solid var(--border-color); cursor: not-allowed; }
        select { flex: 1; max-width: 600px; padding: 10px 15px; border-radius: 10px; border: 1px solid var(--border-color); font-size: 16px; }
        .expected-check-container { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 16px; color: #666; }
        .expected-check-container input { cursor: pointer; }

        .tab-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .tab { padding: 12px; border-radius: 15px; border: none; font-weight: 700; cursor: pointer; background: #f5f5f5; transition: 0.3s; }
        .tab.active-blue { background: var(--primary-blue); color: white; }
        .tab.active-green { background: var(--primary-green); color: white; }

        .input-panel { border: 1px solid var(--border-color); border-radius: 20px; padding: 20px; min-height: 180px; display: flex; flex-direction: column; justify-content: space-between; }
        textarea { width: 100%; border: none; font-size: 16px; resize: none; outline: none; min-height: 100px; background: transparent; }
        textarea[readonly] { color: #888; }
        .action-btn { width: 100%; padding: 12px; border-radius: 15px; font-weight: 700; cursor: pointer; margin-top: 15px; transition: 0.3s; background: white; }
        .btn-blue { border: 1px solid var(--primary-blue); color: var(--primary-blue); }
        .btn-blue.recording { background: #fff1f1; color: #fa3e3e; border-color: #fa3e3e; animation: pulse 1.5s infinite; }
        .btn-green { border: 1px solid var(--primary-green); color: var(--primary-green); }
        .btn-green.success { background-color: var(--primary-green) !important; color: white !important; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-card { background: white; width: 90%; max-width: 500px; padding: 42px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; position: relative; }
        .modal-qid { background: #f8f9fa; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; border: 1px solid #eee; }
        .modal-text { color: #555; margin-bottom: 25px; line-height: 1.2; }
        .modal-options { display: flex; justify-content: center; gap: 30px; margin-bottom: 15px; }
        .modal-option { display: flex; align-items: center; gap: 12px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .modal-option input { width: 18px; height: 18px; }
        .modal-close-x { position: absolute; top: 15px; right: 20px; font-size: 25px; color: #ccc; cursor: pointer; line-height: 1; transition: 0.2s; }
        .modal-close-x:hover { color: #E1575A; }

        .register-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .register-card {
            background: white; padding: 44px 40px; border-radius: 24px;
            width: 90%; max-width: 420px; text-align: center;
            box-shadow: 0 12px 32px rgba(0,0,0,0.18);
        }
        .register-card h2 { color: var(--primary-blue); font-size: 22px; margin-bottom: 6px; }
        .register-card p { color: #888; font-size: 14px; margin-bottom: 24px; }
        .register-input {
            width: 100%; padding: 11px 15px; margin: 7px 0;
            border: 1px solid var(--border-color); border-radius: 12px;
            font-size: 16px; box-sizing: border-box; outline: none; transition: border 0.2s;
        }
        .register-input:focus { border-color: var(--primary-blue); }
        .register-btn {
            width: 100%; padding: 13px; margin-top: 16px; border-radius: 14px; border: none;
            background: var(--primary-blue); color: white;
            font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .register-btn:hover { background: #1560c8; }

        .result-section { margin-top: 40px; background: var(--bg-gray); border-radius: 20px; padding: 25px; }
        .result-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
        .filter-container { display: flex; gap: 10px; }
        .filter-btn { padding: 6px 18px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; font-size: 14px; font-weight: bold; }
        .filter-btn.active[data-type="all"] { background: #e0e0e0; }
        .filter-btn.active[data-type="success"] { background: #42B72A; color: white; }
        .filter-btn.active[data-type="fail"] { background: #E1575A; color: white; }

        table { width: 100%; background: white; border-collapse: collapse; border-radius: 10px; overflow: hidden; border: 1px solid var(--border-color); }
        th, td { padding: 12px 15px; font-size: 14px; text-align: left; border-bottom: 1px solid var(--border-color); }
        .status-loading { color: #888; }
        .status-success { color: #42B72A; font-weight: bold; }
        .status-fail { color: #E1575A; font-weight: bold; }

        .exclude-btn {
            background: none; border: none; color: #ccc;
            cursor: pointer; font-size: 16px; padding: 2px 6px;
            border-radius: 4px; transition: 0.2s;
        }
        .exclude-btn:hover { color: #E1575A; background: #fff0f0; }

        .history-status { text-align: center; color: #888; font-size: 14px; padding: 12px; }
        /* 讓語音模式下的提示字變淡藍色 */
        .tab-group:has(#tabAudio.active-blue) ~ .input-panel textarea::placeholder {
            color: #a0c6f9;
        }
        
        /* 讓鍵盤模式下的提示字變淡綠色 */
        .tab-group:has(#tabManual.active-green) ~ .input-panel textarea::placeholder {
            color: #a7e09a;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body>

<!-- 註冊 Modal -->
<div id="registerOverlay" class="register-overlay">
    <div class="register-card">
        <h2>醫師資料登錄</h2>
        <p>第一次使用請填寫以下資料，之後會自動記住</p>
        <input id="regName"     class="register-input" placeholder="姓名" />
        <input id="regHospital" class="register-input" placeholder="醫院" />
        <input id="regDept"     class="register-input" placeholder="科別" />
        <button class="register-btn" onclick="saveDoctor()">開始使用</button>
    </div>
</div>

<!-- 預期答案 Modal -->
<div id="modalOverlay" class="modal-overlay">
    <div class="modal-card">
        <span class="modal-close-x" onclick="closeModal()">&times;</span>
        <div id="modalQid" class="modal-qid"></div>
        <div id="modalContent" class="modal-text"></div>
        <div class="modal-options">
            <label class="modal-option">
                <input type="radio" name="expectedResult" value="成功" checked> 預期正確
            </label>
            <label class="modal-option">
                <input type="radio" name="expectedResult" value="失敗"> 預期錯誤
            </label>
        </div>
        <button class="action-btn btn-green" onclick="submitWithExpected()">確認並送出辨識</button>
    </div>
</div>

<!-- 主介面 -->
<div class="main-card">
    <h1>NIHSS LLM語音輸入測試</h1>

    <div class="doctor-bar">
        👤 <span id="doctorInfo">載入中...</span>
        <button onclick="resetDoctor()">重新填寫</button>
    </div>

    <div class="section-header">
        <div class="section-title">目前測試題號</div>
        <div class="selector-group">
            <button id="prevBtn" class="nav-btn" onclick="changeQuestion(-1)"> &lt; </button>
            <select id="questionId" onchange="checkNavButtons()">
                <option value="1A">1A: Level of consciousness</option>
                <option value="1B">1B: LOC Questions（詢問月份、年齡）</option>
                <option value="1C">1C: LOC Commands（執行命令：睜、閉眼；握拳、放開）</option>
                <option value="2">2: Best Gaze</option>
                <option value="3">3: Visual</option>
                <option value="4">4: Facial Palsy（執行命令：露齒及閉眼）</option>
                <option value="5aL">5aL: Left Arm（請病人手平舉90度，計數10秒）</option>
                <option value="5bR">5bR: Right Arm（請病人手平舉90度，計數10秒）</option>
                <option value="6aL">6aL: Left Leg（請病人平躺，腿抬起30度，計數5秒）</option>
                <option value="6bR">6bR: Right Leg（請病人平躺，腿抬起30度，計數5秒）</option>
                <option value="7">7: Limb Ataxia</option>
                <option value="8">8: Sensory</option>
                <option value="9">9: Best Language（測試病人表達流暢、命名、複述及了解程度）</option>
                <option value="10">10: Dysarthria（測試視覺、觸覺、聽覺其中任一項刺激反應消失）</option>
                <option value="11">11: Extinction and Inattention</option>
            </select>
            <button id="nextBtn" class="nav-btn" onclick="changeQuestion(1)"> &gt; </button>
        </div>
        <div class="expected-check-container">
            <input type="checkbox" id="enableExpected">
            <label for="enableExpected">若勾選此項，送出辨識前需選擇預期結果，以利系統收集資料於往後提高辨識成功率</label>
        </div>
    </div>

    <div class="tab-group">
        <button id="tabAudio" class="tab active-blue" onclick="switchMode('audio')">語音輸入</button>
        <button id="tabManual" class="tab" onclick="switchMode('manual')">鍵盤輸入</button>
    </div>

    <div class="input-panel">
        <textarea id="inputText" placeholder="此區域顯示語音輸入的文字..." readonly></textarea>
        <button id="actionBtn" class="action-btn btn-blue" onclick="handleAction()">開始說話</button>
    </div>

    <div class="result-section">
        <div class="result-header">
            <div class="section-title" style="margin:0">辨識結果總覽</div>
            <div class="filter-container">
                <button class="filter-btn active" data-type="all" onclick="filterTable('all', this)">全部總覽</button>
                <button class="filter-btn" data-type="success" onclick="filterTable('success', this)">辨識成功</button>
                <button class="filter-btn" data-type="fail" onclick="filterTable('fail', this)">辨識失敗</button>
            </div>
        </div>
        <div id="historyStatus" class="history-status">載入歷史紀錄中...</div>
        <table id="resultTable">
            <thead>
                <tr>
                    <th width="12%">題號</th>
                    <th width="48%">傳送內容</th>
                    <th width="20%">預期結果</th>
                    <th width="20%">AI辨識結果</th>
                    <th width="5%"></th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    // ═══════════════════════════════════════════
    // ★★★ 填入你的網址 網址★★★
    // ═══════════════════════════════════════════

    // 1. ngrok 網址（每次重啟 ngrok 後更新）
    const LLM_URL = "https://chance-trench-scored.ngrok-free.dev/evaluate";

    // 2. Google Apps Script 網址（部署一次後固定）
    const SHEET_URL = "https://script.google.com/macros/s/AKfycbyaLEUzXod3ZiHHL596OIJzyF2Rx7s6-xPiPgCxfi7KFAm0h5t6ejW3JuhPgptke6ZV/exec";

    // ═══════════════════════════════════════════
    // 醫師資料管理
    // ═══════════════════════════════════════════
    function loadDoctor() {
        const info = localStorage.getItem('doctorInfo');
        if (info) {
            const d = JSON.parse(info);
            document.getElementById('doctorInfo').textContent = `${d.name}　${d.hospital}　${d.dept}`;
            document.getElementById('registerOverlay').style.display = 'none';
            loadHistory(d.name);
        } else {
            document.getElementById('registerOverlay').style.display = 'flex';
            document.getElementById('doctorInfo').textContent = '未登錄';
            document.getElementById('historyStatus').textContent = '請先登錄醫師資料';
        }
    }

    function saveDoctor() {
        const name     = document.getElementById('regName').value.trim();
        const hospital = document.getElementById('regHospital').value.trim();
        const dept     = document.getElementById('regDept').value.trim();
        if (!name || !hospital || !dept) { alert("請填寫所有欄位"); return; }
        localStorage.setItem('doctorInfo', JSON.stringify({ name, hospital, dept }));
        loadDoctor();
    }

    function resetDoctor() {
        if (!confirm("確定要重新填寫醫師資料嗎？")) return;
        localStorage.removeItem('doctorInfo');
        document.getElementById('regName').value = '';
        document.getElementById('regHospital').value = '';
        document.getElementById('regDept').value = '';
        document.getElementById('resultTable').getElementsByTagName('tbody')[0].innerHTML = '';
        document.getElementById('historyStatus').textContent = '請先登錄醫師資料';
        document.getElementById('registerOverlay').style.display = 'flex';
    }

    // ═══════════════════════════════════════════
    // 從 Google Sheets 載入歷史紀錄
    // ═══════════════════════════════════════════
    async function loadHistory(doctorName) {
        const statusEl = document.getElementById('historyStatus');
        statusEl.textContent = '載入歷史紀錄中...';
        try {
            const baseUrl = LLM_URL.replace('/evaluate', '');
            const res = await fetch(`${baseUrl}/history?doctor=${encodeURIComponent(doctorName)}`, {
                headers: { 'ngrok-skip-browser-warning': 'true' }
            });
            const records = await res.json();
            statusEl.textContent = '';
            if (records.length === 0) {
                statusEl.textContent = '目前沒有歷史紀錄';
                return;
            }
            const tbody = document.getElementById('resultTable').getElementsByTagName('tbody')[0];
            tbody.innerHTML = '';
            records.reverse().forEach(r => {
                const doctor = JSON.parse(localStorage.getItem('doctorInfo') || '{}');
                r.doctor_name = doctor.name;  // 補上這行
                addRowToTable(
                    r.question, r.input_text, r.expected_result,
                    r.model_result + (r.model_type ? ` (${r.model_type})` : ""),
                    r.model_result === "成功", r.timestamp, r, true
                );
            });
        } catch (err) {
            console.log("loadHistory 錯誤：", err);
            statusEl.textContent = '歷史紀錄載入失敗';
        }
    }

    // ═══════════════════════════════════════════
    // 表格操作
    // ═══════════════════════════════════════════
    function addRowToTable(qid, content, expected, result, isSuccess, timestamp, sheetData, atEnd = false) {
        const tbody = document.getElementById('resultTable').getElementsByTagName('tbody')[0];
        const row = atEnd ? tbody.insertRow(tbody.rows.length) : tbody.insertRow(0);
        row.setAttribute('data-status', isSuccess ? 'success' : 'fail');
        if (sheetData) row.dataset.sheetData = JSON.stringify(sheetData);

        const expClass = (expected === "成功") ? "status-success" : (expected === "失敗" ? "status-fail" : "");
        const resClass = isSuccess ? 'status-success' : 'status-fail';
        const timeStr  = timestamp ? String(timestamp).slice(5, 16) : '';

        row.innerHTML = `
            <td>${qid}</td>
            <td>${content}</td>
            <td class="${expClass}">${expected}</td>
            <td class="${resClass}">${result}</td>
            <td><button class="exclude-btn" onclick="excludeRow(this)" title="排除此筆資料">✕</button></td>
        `;
        return row;
    }

    function excludeRow(btn) {
        if (!confirm("確定要排除這筆資料嗎？\nSheets 上會標記為 excluded，原始資料保留。")) return;
        const row = btn.closest('tr');
        const data = JSON.parse(row.dataset.sheetData || '{}');
        console.log("送出的 exclude 資料：", data); // 加這行
        console.log("完整資料：", JSON.stringify(data));

        fetch(SHEET_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: "exclude", ...data })
        }).catch(() => {});

        row.style.opacity = '0.3';
        row.style.textDecoration = 'line-through';
        row.setAttribute('data-status', 'excluded');
        btn.disabled = true;
    }

    // ═══════════════════════════════════════════
    // Google Sheets 寫入
    // ═══════════════════════════════════════════
    function sendToSheet(payload) {
        const doctor    = JSON.parse(localStorage.getItem('doctorInfo') || '{}');
        const timestamp = new Date().toLocaleString('zh-TW');

        const data = {
            action:          "insert",
            timestamp:       timestamp,
            doctor_name:     doctor.name     || "",
            hospital:        doctor.hospital || "",
            department:      doctor.dept     || "",
            question:        payload.question,
            input_text:      payload.text,
            expected_result: payload.expected,
            model_result:    payload.result,
            is_correct:      payload.result === payload.expected ? "正確" : "錯誤",
            model_type:      payload.type    || "",
        };

        fetch(SHEET_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        }).catch(() => {});

        return data;
    }

    // ═══════════════════════════════════════════
    // 主要功能
    // ═══════════════════════════════════════════
    let mode = 'audio';
    let isRecording = false;
    let pendingText = "";

    window.onload = () => { loadDoctor(); checkNavButtons(); };

    function switchMode(m) {
        mode = m;
        const audioBtn = document.getElementById('tabAudio');
        const manualBtn = document.getElementById('tabManual');
        const actionBtn = document.getElementById('actionBtn');
        const inputText = document.getElementById('inputText');
    
        if (m === 'audio') {
            audioBtn.className = 'tab active-blue';
            manualBtn.className = 'tab';
            actionBtn.className = 'action-btn btn-blue';
            actionBtn.innerText = '開始說話';
            
            // --- 語音模式優化 ---
            inputText.placeholder = '此區域顯示語音輸入的文字...';
            inputText.style.color = 'var(--primary-blue)'; // 文字改成藍色
            inputText.readOnly = true; // 鎖定編輯
            inputText.value = ""; 
        } else {
            audioBtn.className = 'tab';
            manualBtn.className = 'tab active-green';
            actionBtn.className = 'action-btn btn-green';
            actionBtn.innerText = '送出辨識';
            
            // --- 鍵盤模式優化 ---
            inputText.placeholder = '請於此區域輸入指令...';
            inputText.style.color = 'var(--primary-green)'; // 文字改成綠色
            inputText.readOnly = false; // 開放編輯
        }
    }

    function changeQuestion(dir) {
        const select = document.getElementById('questionId');
        const newIndex = select.selectedIndex + dir;
        if (newIndex >= 0 && newIndex < select.options.length) {
            select.selectedIndex = newIndex;
            checkNavButtons();
        }
    }

    function checkNavButtons() {
        const select = document.getElementById('questionId');
        document.getElementById('prevBtn').disabled = (select.selectedIndex === 0);
        document.getElementById('nextBtn').disabled = (select.selectedIndex === select.options.length - 1);
    }

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'zh-TW';

    recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        document.getElementById('inputText').value = text;
        processInput(text);
    };

    recognition.onend = () => {
        isRecording = false;
        document.getElementById('actionBtn').innerText = (mode === 'audio') ? '開始說話' : '送出辨識';
        document.getElementById('actionBtn').classList.remove('recording');
    };

    function handleAction() {
        const textInput = document.getElementById('inputText').value;
        const actionBtn = document.getElementById('actionBtn');
        if (mode === 'audio') {
            if (!isRecording) {
                isRecording = true;
                actionBtn.innerText = '正在聆聽... (點擊停止)';
                actionBtn.classList.add('recording');
                recognition.start();
            } else {
                recognition.stop();
            }
        } else {
            if (!textInput.trim()) { alert("請輸入內容"); return; }
            const originalText = actionBtn.innerText;
            actionBtn.innerText = "傳送成功";
            actionBtn.classList.add('success');
            setTimeout(() => {
                actionBtn.innerText = originalText;
                actionBtn.classList.remove('success');
            }, 500);
            processInput(textInput);
            document.getElementById('inputText').value = "";
        }
    }

    function processInput(text) {
        const needExpected = document.getElementById('enableExpected').checked;
        if (needExpected) {
            pendingText = text;
            const select = document.getElementById('questionId');
            document.getElementById('modalQid').innerText = select.options[select.selectedIndex].text;
            document.getElementById('modalContent').innerText = `「${text}」`;
            document.getElementById('modalOverlay').style.display = 'flex';
        } else {
            callLLM(text, "無預期");
        }
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
        pendingText = "";
    }

    function submitWithExpected() {
        const expected = document.querySelector('input[name="expectedResult"]:checked').value;
        document.getElementById('modalOverlay').style.display = 'none';
        callLLM(pendingText, expected);
    }

    async function callLLM(text, expected) {
        const qid = document.getElementById('questionId').value;

        // 先插入 loading 列在最上方
        const tbody = document.getElementById('resultTable').getElementsByTagName('tbody')[0];
        const loadingRow = tbody.insertRow(0);
        loadingRow.setAttribute('data-status', 'loading');
        const expClass = (expected === "成功") ? "status-success" : (expected === "失敗" ? "status-fail" : "");
        loadingRow.innerHTML = `
            <td>${qid}</td>
            <td>${text}</td>
            <td class="${expClass}">${expected}</td>
            <td class="status-loading">AI 判讀中...</td>
            <td style="color:#aaa;font-size:12px;">剛剛</td>
            <td></td>
        `;

        try {
            const res = await fetch(LLM_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'ngrok-skip-browser-warning': 'true'
                },
                body: JSON.stringify({ question: qid, text, expected })
            });
            const data = await res.json();

            const isSuccess = data.result === "成功";
            const typeLabel = data.type ? ` (${data.type})` : "";

            loadingRow.setAttribute('data-status', isSuccess ? 'success' : 'fail');
            loadingRow.cells[3].textContent = data.result + typeLabel;
            loadingRow.cells[3].className   = isSuccess ? 'status-success' : 'status-fail';

            // 寫入 Sheets 並存 sheetData 供刪除用
            const sheetData = sendToSheet({ question: qid, text, expected, result: data.result, type: data.type });
            loadingRow.dataset.sheetData = JSON.stringify(sheetData);
            loadingRow.cells[4].innerHTML = `<button class="exclude-btn" onclick="excludeRow(this)" title="排除此筆資料">✕</button>`;

        } catch (err) {
            loadingRow.setAttribute('data-status', 'fail');
            loadingRow.cells[3].textContent = "連線失敗";
            loadingRow.cells[3].className   = 'status-fail';
        }
    }

    function filterTable(type, btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll("#resultTable tbody tr").forEach(row => {
            const status = row.getAttribute('data-status');
            row.style.display = (type === 'all' || status === type) ? "" : "none";
        });
    }
</script>
</body>
</html>
