<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIHSS 語音評估系統 v2.1</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f9; color: #333; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; max-width: 500px; width: 100%; box-sizing: border-box; }
        h2 { margin-bottom: 20px; color: #0056b3; }
        label { display: block; text-align: left; margin-bottom: 8px; font-weight: bold; }
        select { padding: 12px; font-size: 16px; margin-bottom: 25px; width: 100%; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 18px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; width: 100%; font-weight: bold; transition: 0.2s; }
        .record-off { background-color: #007bff; color: white; }
        .record-off:hover { background-color: #0056b3; }
        .record-on { background-color: #dc3545; color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        #status { margin-top: 20px; color: #666; font-style: italic; min-height: 20px; }
        .result-box { margin-top: 30px; text-align: left; border-top: 2px solid #eee; padding-top: 20px; }
        .res-item { margin-bottom: 15px; background: #f8f9fa; padding: 10px; border-radius: 5px; border-left: 4px solid #007bff; }
        .label-text { font-size: 14px; color: #777; display: block; margin-bottom: 5px; }
        .content-text { font-size: 16px; font-weight: bold; color: #222; }
    </style>
</head>
<body>

<div class="container">
    <h2>NIHSS 語音辨識 測試</h2>
    
    <label for="questionId">1. 選擇評估題號：</label>
    <select id="questionId">
        <option value="1A">1A: 意識程度</option>
        <option value="1B">1B: 意識提問</option>
        <option value="1C">1C: 意識指令</option>
        <option value="2">2: 最佳眼球運動</option>
        <option value="3">3: 視野</option>
        <option value="4">4: 面癱</option>
        <option value="5aL">5aL: 左上肢運動</option>
        <option value="5bR">5bR: 右上肢運動</option>
        <option value="6aL">6aL: 左下肢運動</option>
        <option value="6bR">6bR: 右下肢運動</option>
        <option value="7">7: 肢體運動失調</option>
        <option value="8">8: 感覺</option>
        <option value="9">9: 最佳語言</option>
        <option value="10">10: 構音障礙</option>
        <option value="11">11: 忽視症</option>
    </select>

    <button id="btn" class="record-off">開始錄音</button>
    <div id="status">準備就緒</div>

    <div class="result-box">
        <div class="res-item">
            <span class="label-text">語音識別內容 (STT)：</span>
            <span id="stt-text" class="content-text">等待錄音...</span>
        </div>
        <div class="res-item">
            <span class="label-text">AI 判讀建議 (LLM)：</span>
            <span id="ai-res" class="content-text">等待評估...</span>
        </div>
    </div>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const sttDisplay = document.getElementById('stt-text');
    const aiDisplay = document.getElementById('ai-res');
    const qidSelect = document.getElementById('questionId');

    // --- 請在此填入您的 Token ---
    const WIT_TOKEN = "2Z3JO2DMTHIIFKXE46XBDAW445LKTBUT"; 
    const LLM_URL = "http://140.116.32.48:8000/evaluate";

    btn.onclick = async () => {
        if (!mediaRecorder || mediaRecorder.state === 'inactive') {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = processAudio;
                mediaRecorder.start();
                btn.innerText = "停止錄音";
                btn.className = "record-on";
                status.innerText = "正在聆聽受測者回答...";
            } catch (err) {
                status.innerText = "無法開啟麥克風，請檢查權限或網址是否為 HTTPS";
            }
        } else {
            mediaRecorder.stop();
            btn.innerText = "開始錄音";
            btn.className = "record-off";
            status.innerText = "正在辨識語音並連線至成大 LLM...";
        }
    };

    async function processAudio() {
        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
        // 確保 Token 沒有任何奇怪的空格或中文
        const cleanToken = WIT_TOKEN.replace(/[^\x00-\x7F]/g, "").trim();

        try {
            // 1. 呼叫 Wit.ai STT
            const witRes = await fetch(`https://api.wit.ai/speech`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${cleanToken}`,
                    'Content-Type': 'audio/wav' 
                },
                body: audioBlob
            });

            const rawWit = await witRes.text();
            const jsonLines = rawWit.trim().split('\n');
            const lastJson = JSON.parse(jsonLines[jsonLines.length - 1]);
            const sttText = lastJson.text || "辨識無效";
            sttDisplay.innerText = sttText;

            // 2. 呼叫 LLM 評估 (140.116.32.48)
            const llmRes = await fetch(LLM_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    question: qidSelect.value,
                    text: sttText
                })
            });

            if (!llmRes.ok) throw new Error("LLM 伺服器回應異常");

            const llmData = await llmRes.json();
            // 顯示結果，如果 LLM 回傳格式有誤則提供備用顯示
            aiDisplay.innerText = llmData.result ? `${llmData.result} (${llmData.type || 'N/A'})` : "回傳格式錯誤";
            status.innerText = "評估完成。";

        } catch (err) {
            console.error(err);
            status.innerText = "錯誤：" + err.message;
            aiDisplay.innerText = "連線或解析失敗";
        }
    }
</script>
</body>
</html>
