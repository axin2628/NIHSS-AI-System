<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIHSS LLM 語音輸入測試</title>
    <style>
        :root {
            --primary-blue: #1b78f2;
            --primary-green: #42b72a;
            --bg-gray: #f8f9fa;
            --text-gray: #4e4e4e;
            --border-color: #e7e7e7;
            --disabled-gray: #e0e0e0;
            --disabled-text: #b0b0b0;
        }

        body {
            font-family: 'Noto Sans', 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            color: var(--text-gray);
        }

        .main-card {
            background: white;
            width: 100%;
            max-width: 800px;
            border-radius: 14px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
            padding: 40px;
        }

        h1 {
            color: var(--primary-blue);
            font-size: 32px;
            text-align: center;
            margin-bottom: 30px;
        }

        /* 第一區塊：題號選擇 */
        .section-header {
            background: var(--bg-gray);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .selector-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .nav-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #f1f1f1;
            box-shadow: 1px 1px 3px rgba(0,0,0,0.2);
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        /* 禁用按鈕樣式 */
        .nav-btn:disabled {
            background: white;
            color: var(--disabled-text);
            box-shadow: none;
            border: 1px solid var(--border-color);
            cursor: not-allowed;
        }

        select {
            flex: 1;
            max-width: 400px;
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            font-size: 16px;
            background: white;
        }

        /* 第二區塊：輸入模式切換 */
        .tab-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tab {
            padding: 12px;
            border-radius: 15px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            background: #f5f5f5;
            color: var(--text-gray);
            transition: 0.3s;
        }

        .tab.active-blue { background: var(--primary-blue); color: white; }
        .tab.active-green { background: var(--primary-green); color: white; }

        .input-panel {
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            min-height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        textarea {
            width: 100%;
            border: none;
            font-size: 16px;
            resize: none;
            outline: none;
            color: var(--text-gray);
            min-height: 100px;
            background: transparent;
        }

        /* 唯讀狀態下的樣式 */
        textarea[readonly] {
            color: #888;
            cursor: default;
        }

        .action-btn {
            width: 100%;
            padding: 12px;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
            background: white;
        }

        .btn-blue { border: 1px solid var(--primary-blue); color: var(--primary-blue); }
        .btn-blue.recording { background: #fff1f1; color: #fa3e3e; border-color: #fa3e3e; animation: pulse 1.5s infinite; }
        .btn-green { border: 1px solid var(--primary-green); color: var(--primary-green); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        /* 第三區塊：辨識結果總覽 */
        .result-section {
            margin-top: 40px;
            background: var(--bg-gray);
            border-radius: 20px;
            padding: 25px;
        }

        table {
            width: 100%;
            background: white;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        th, td {
            padding: 12px 15px;
            font-size: 14px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

<div class="main-card">
    <h1>NIHSS LLM語音輸入測試</h1>

    <div class="section-header">
        <div class="section-title">當前評估題號</div>
        <div class="selector-group">
            <button id="prevBtn" class="nav-btn" onclick="changeQuestion(-1)"> &lt; </button>
            <select id="questionId" onchange="checkNavButtons()">
                <option value="1A">1A: Level of consciousness</option>
                <option value="1B">1B: LOC Questions</option>
                <option value="1C">1C: LOC Commands</option>
                <option value="2">2: Best Gaze</option>
                <option value="3">3: Visual</option>
                <option value="4">4: Facial Palsy</option>
                <option value="5aL">5aL: Left Arm</option>
                <option value="5bR">5bR: Right Arm</option>
                <option value="6aL">6aL: Left Leg</option>
                <option value="6bR">6bR: Right Leg</option>
                <option value="7">7: Limb Ataxia</option>
                <option value="8">8: Sensory</option>
                <option value="9">9: Best Language</option>
                <option value="10">10: Dysarthria</option>
                <option value="11">11: Extinction and Inattention</option>
            </select>
            <button id="nextBtn" class="nav-btn" onclick="changeQuestion(1)"> &gt; </button>
        </div>
    </div>

    <div class="tab-group">
        <button id="tabAudio" class="tab active-blue" onclick="switchMode('audio')">語音輸入</button>
        <button id="tabManual" class="tab" onclick="switchMode('manual')">鍵盤輸入</button>
    </div>

    <div class="input-panel">
        <textarea id="inputText" placeholder="此區域顯示語音輸入的文字..." readonly></textarea>
        
        <button id="actionBtn" class="action-btn btn-blue" onclick="handleAction()">開始說話</button>
    </div>

    <div class="result-section">
        <div class="section-title">辨識結果總覽</div>
        <table id="resultTable">
            <thead>
                <tr>
                    <th width="15%">題號</th>
                    <th width="55%">傳送內容</th>
                    <th width="30%">辨識結果</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    let mode = 'audio';
    let isRecording = false;
    const LLM_URL = "http://140.116.32.48:8000/evaluate";

    // 初始化檢查按鈕狀態
    window.onload = () => {
        checkNavButtons();
    };

    // 1. 切換 語音/鍵盤 模式
    function switchMode(m) {
        mode = m;
        const audioBtn = document.getElementById('tabAudio');
        const manualBtn = document.getElementById('tabManual');
        const actionBtn = document.getElementById('actionBtn');
        const inputText = document.getElementById('inputText');

        if (m === 'audio') {
            audioBtn.className = 'tab active-blue';
            manualBtn.className = 'tab';
            actionBtn.className = 'action-btn btn-blue';
            actionBtn.innerText = '開始說話';
            inputText.placeholder = '此區域顯示語音輸入的文字...';
            inputText.readOnly = true; // 鎖定編輯
            inputText.value = ""; 
        } else {
            audioBtn.className = 'tab';
            manualBtn.className = 'tab active-green';
            actionBtn.className = 'action-btn btn-green';
            actionBtn.innerText = '送出辨識';
            inputText.placeholder = '請使用鍵盤輸入文字...';
            inputText.readOnly = false; // 開放編輯
        }
    }

    // 2. 題號左右切換與按鈕變色邏輯
    function changeQuestion(dir) {
        const select = document.getElementById('questionId');
        let newIndex = select.selectedIndex + dir;
        if (newIndex >= 0 && newIndex < select.options.length) {
            select.selectedIndex = newIndex;
            checkNavButtons();
        }
    }

    function checkNavButtons() {
        const select = document.getElementById('questionId');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // 第一題時：左按鈕失效
        prevBtn.disabled = (select.selectedIndex === 0);
        // 最後一題時：右按鈕失效
        nextBtn.disabled = (select.selectedIndex === select.options.length - 1);
    }

    // 3. 語音辨識邏輯
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'zh-TW';

    recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        document.getElementById('inputText').value = text;
        callLLM(text);
    };

    recognition.onend = () => {
        isRecording = false;
        document.getElementById('actionBtn').innerText = '開始說話';
        document.getElementById('actionBtn').classList.remove('recording');
    };

    function handleAction() {
        const textInput = document.getElementById('inputText').value;
        if (mode === 'audio') {
            if (!isRecording) {
                isRecording = true;
                document.getElementById('actionBtn').innerText = '正在聆聽... (點擊停止)';
                document.getElementById('actionBtn').classList.add('recording');
                recognition.start();
            } else {
                recognition.stop();
            }
        } else {
            if (!textInput.trim()) return alert("請輸入內容");
            callLLM(textInput);
        }
    }

    async function callLLM(text) {
        const qid = document.getElementById('questionId').value;
        try {
            const res = await fetch(LLM_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: qid, text: text })
            });
            const data = await res.json();
            updateTable(qid, text, `${data.result} (${data.type})`);
        } catch (err) {
            updateTable(qid, text, "連線失敗");
        }
    }

    function updateTable(qid, content, res) {
        const table = document.getElementById('resultTable').getElementsByTagName('tbody')[0];
        const newRow = table.insertRow(0);
        newRow.innerHTML = `<td>${qid}</td><td>${content}</td><td>${res}</td>`;
    }
</script>
</body>
</html>
