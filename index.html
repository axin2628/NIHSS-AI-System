<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIHSS 語音評估系統 v2</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; max-width: 500px; width: 100%; }
        select { padding: 10px; font-size: 16px; margin-bottom: 20px; width: 100%; border-radius: 5px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border: none; border-radius: 5px; width: 100%; }
        .record-off { background-color: #007bff; color: white; }
        .record-on { background-color: #dc3545; color: white; }
        #status { margin-top: 15px; color: #666; font-size: 14px; }
        .result-box { margin-top: 25px; text-align: left; border-top: 1px solid #ddd; padding-top: 15px; }
        .label { font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>NIHSS 臨床評估 AI 測試</h2>
    
    <label class="label">1. 選擇評估題號：</label>
    <select id="questionId">
        <option value="1A">1A: 意識程度</option>
        <option value="1B">1B: 意識提問</option>
        <option value="1C">1C: 意識指令</option>
        <option value="2">2: 最佳眼球運動</option>
        <option value="3">3: 視野</option>
        <option value="4">4: 面癱</option>
        <option value="5aL">5aL: 左上肢運動</option>
        <option value="5bR">5bR: 右上肢運動</option>
        <option value="6aL">6aL: 左下肢運動</option>
        <option value="6bR">6bR: 右下肢運動</option>
        <option value="7">7: 肢體運動失調</option>
        <option value="8">8: 感覺</option>
        <option value="9">9: 最佳語言</option>
        <option value="10">10: 構音障礙</option>
        <option value="11">11: 忽視症</option>
    </select>

    <button id="btn" class="record-off">開始錄音</button>
    <div id="status">準備就緒</div>

    <div class="result-box">
        <p><span class="label">辨識文字 (STT)：</span> <span id="stt-text">等待中...</span></p>
        <p><span class="label">AI 判讀結果：</span> <span id="ai-res">等待中...</span></p>
    </div>
</div>

<script>
    let mediaRecorder;
    let audioChunks = [];
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const sttDisplay = document.getElementById('stt-text');
    const aiDisplay = document.getElementById('ai-res');
    const qidSelect = document.getElementById('questionId');

    const WIT_TOKEN = "你的_WIT_AI_TOKEN"; 
    const LLM_URL = "http://140.116.32.48:8000/evaluate";

    btn.onclick = async () => {
        if (!mediaRecorder || mediaRecorder.state === 'inactive') {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = processAudio;
            mediaRecorder.start();
            btn.innerText = "停止錄音";
            btn.className = "record-on";
            status.innerText = "正在聆聽...";
        } else {
            mediaRecorder.stop();
            btn.innerText = "開始錄音";
            btn.className = "record-off";
            status.innerText = "正在辨識並傳送給 LLM...";
        }
    };

    async function processAudio() {
        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });

        try {
            const witRes = await fetch(`https://api.wit.ai/speech`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${WIT_TOKEN}`, 'Content-Type': 'audio/wav' },
                body: audioBlob
            });

            const rawText = await witRes.text();
            // 修正報錯：Wit.ai 有時回傳多行 JSON，我們只取最後一行
            const jsonLines = rawText.trim().split('\n');
            const lastJson = JSON.parse(jsonLines[jsonLines.length - 1]);
            
            const sttText = lastJson.text || "未能辨識文字";
            sttDisplay.innerText = sttText;

            // 傳送與 Unity 同格式的 JSON
            const payload = {
                question: qidSelect.value,
                text: sttText
            };

            const llmRes = await fetch(LLM_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const llmData = await llmRes.json();
            aiDisplay.innerText = `${llmData.result} - ${llmData.reason || ''}`;
            status.innerText = "評估完成！";

        } catch (err) {
            status.innerText = "連線失敗，請檢查 VPN 與伺服器";
            console.error(err);
        }
    }
</script>
</body>
</html>
