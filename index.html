<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIHSS 語音評估系統 v3.3</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 20px; background: #f0f2f5; color: #1c1e21; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); display: inline-block; max-width: 480px; width: 100%; box-sizing: border-box; }
        h2 { color: #1877f2; margin-bottom: 25px; }
        label { display: block; text-align: left; margin-bottom: 10px; font-weight: 600; color: #4b4f56; }
        select { padding: 12px; font-size: 16px; margin-bottom: 20px; width: 100%; border: 1px solid #dddfe2; border-radius: 6px; background-color: #f5f6f7; }
        button { padding: 16px; font-size: 18px; cursor: pointer; border: none; border-radius: 6px; width: 100%; font-weight: bold; transition: 0.2s; }
        .record-off { background-color: #1877f2; color: white; }
        .record-on { background-color: #fa3e3e; color: white; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        #status { margin-top: 15px; color: #8d949e; font-size: 14px; min-height: 20px; }
        .result-box { margin-top: 30px; text-align: left; border-top: 1px solid #dddfe2; padding-top: 20px; }
        .res-card { background: #f0f2f5; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid #1877f2; }
        .res-label { font-size: 12px; color: #606770; font-weight: bold; }
        .res-content { display: block; margin-top: 5px; font-size: 16px; font-weight: 700; color: #1c1e21; }
    </style>
</head>
<body>

<div class="container">
    <h2>NIHSS 臨床評估 AI 測試</h2>
    
    <label for="questionId">1. 選擇評估題號：</label>
    <select id="questionId">
        <option value="1A">1A: 意識程度</option>
        <option value="1B">1B: 意識提問</option>
        <option value="1C">1C: 意識指令</option>
        <option value="2">2: 最佳眼球運動</option>
        <option value="3">3: 視野</option>
        <option value="4">4: 面癱</option>
        <option value="5aL">5aL: 左上肢運動</option>
        <option value="5bR">5bR: 右上肢運動</option>
        <option value="6aL">6aL: 左下肢運動</option>
        <option value="6bR">6bR: 右下肢運動</option>
        <option value="7">7: 肢體運動失調</option>
        <option value="8">8: 感覺</option>
        <option value="9">9: 最佳語言</option>
        <option value="10">10: 構音障礙</option>
        <option value="11">11: 忽視症</option>
    </select>

    <button id="btn" class="record-off">開始錄音</button>
    <div id="status">系統已就緒</div>

    <div class="result-box">
        <div class="res-card">
            <span class="res-label">識別內容 (STT)</span>
            <span id="stt-text" class="res-content">等待辨識...</span>
        </div>
        <div class="res-card">
            <span class="res-label">AI 判讀建議 (LLM)</span>
            <span id="ai-res" class="res-content">等待評估...</span>
        </div>
    </div>
</div>

<script>
    // --- 內建 Recorder.js 核心程式碼 ---
    (function(f){if(typeof exports==="object"&&typeof module!=="undefined"){module.exports=f()}else if(typeof define==="function"&&define.amd){define([],f)}else{var g;if(typeof window!=="undefined"){g=window}else if(typeof global!=="undefined"){g=global}else if(typeof self!=="undefined"){g=self}else{g=this}g.Recorder=f()}})(function(){var define,module,exports;return (function e(t,n,r){function s(o,u){if(!n[o]){if(!t[o]){var a=typeof require=="function"&&require;if(!u&&a)return a(o,!0);if(i)return i(o,!0);var f=new Error("Cannot find module '"+o+"'");throw f.code="MODULE_NOT_FOUND",f}var l=n[o]={exports:{}};t[o][0].call(l.exports,function(e){var n=t[o][1][e];return s(n?n:e)},l,l.exports,e,t,n,r)}return n[o].exports}var i=typeof require=="function"&&require;for(var o=0;o<r.length;o++)s(r[o]);return s})({1:[function(require,module,exports){"use strict";Object.defineProperty(exports,"__esModule",{value:true});var _createClass=function(){function defineProperties(target,props){for(var i=0;i<props.length;i++){var descriptor=props[i];descriptor.enumerable=descriptor.enumerable||false;descriptor.configurable=true;if("value"in descriptor)descriptor.writable=true;Object.defineProperty(target,descriptor.key,descriptor)}}return function(Constructor,protoProps,staticProps){if(protoProps)defineProperties(Constructor.prototype,protoProps);if(staticProps)defineProperties(Constructor,staticProps);return Constructor}}();function _classCallCheck(instance,Constructor){if(!(instance instanceof Constructor)){throw new TypeError("Cannot call a class as a function")}}var Recorder=function(){function Recorder(source,cfg){var _this=this;_classCallCheck(this,Recorder);var config=cfg||{};var bufferLen=config.bufferLen||4096;var numChannels=config.numChannels||2;this.context=source.context;this.node=(this.context.createScriptProcessor||this.context.createJavaScriptNode).call(this.context,bufferLen,numChannels,numChannels);var worker=new Worker(config.workerPath||Recorder.forceDownload(Recorder </script>

<script>
    // --- 業務邏輯 ---
    let audioContext;
    let rec;
    let gumStream;

    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const sttDisplay = document.getElementById('stt-text');
    const aiDisplay = document.getElementById('ai-res');

    const WIT_TOKEN = "2Z3JO2DMTHIIFKXE46XBDAW445LKTBUT"; 
    const LLM_URL = "http://140.116.32.48:8000/evaluate";

    btn.onclick = async function() {
        if (!rec || !rec.recording) {
            try {
                gumStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                let input = audioContext.createMediaStreamSource(gumStream);
                
                // 這次 Recorder 就在上面程式碼裡，絕對不會找不到
                rec = new Recorder(input, { numChannels: 1 });
                rec.record();

                btn.innerText = "停止錄音並分析";
                btn.className = "record-on";
                status.innerText = "錄音中 (16kHz WAV)...";
            } catch (err) {
                status.innerText = "無法開啟麥克風: " + err.message;
            }
        } else {
            rec.stop();
            gumStream.getAudioTracks()[0].stop();
            btn.innerText = "開始錄音";
            btn.className = "record-off";
            status.innerText = "處理音訊中...";
            rec.exportWAV(processAudio);
        }
    };

    async function processAudio(blob) {
        const cleanToken = WIT_TOKEN.replace(/[^\x00-\x7F]/g, "").trim();
        status.innerText = "正在辨識語音...";

        try {
            const witRes = await fetch(`https://api.wit.ai/speech`, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${cleanToken}`,
                    'Content-Type': 'audio/wav' 
                },
                body: blob
            });

            const rawResponse = await witRes.text();
            const jsonMatches = rawResponse.match(/\{.*?\}(?=\s*\{|$)/gs);
            let finalStt = "";

            if (jsonMatches) {
                for (let i = jsonMatches.length - 1; i >= 0; i--) {
                    try {
                        const jsonObj = JSON.parse(jsonMatches[i]);
                        if (jsonObj.text) { finalStt = jsonObj.text; break; }
                    } catch (e) { continue; }
                }
            }

            if (!finalStt) {
                status.innerText = "辨識失敗，請再試一次。";
                return;
            }

            sttDisplay.innerText = finalStt;
            status.innerText = "連線至成大 LLM...";

            const llmRes = await fetch(LLM_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    question: document.getElementById('questionId').value,
                    text: finalStt
                })
            });

            const llmData = await llmRes.json();
            aiDisplay.innerText = `${llmData.result} (${llmData.type || 'N/A'})`;
            status.innerText = "評估完成！";

        } catch (err) {
            status.innerText = "連線失敗: " + err.message;
        }
    }
</script>
</body>
</html>
